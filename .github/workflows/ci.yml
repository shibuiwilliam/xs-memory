name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Format check
        run: |
          go install mvdan.cc/gofumpt@latest
          go install golang.org/x/tools/cmd/goimports@latest
          gofumpt -l . | tee /tmp/fmt.diff
          test ! -s /tmp/fmt.diff || (echo "::error::gofumpt found unformatted files"; exit 1)

      - name: Vet
        run: CGO_ENABLED=0 go vet ./...

      - name: Test (race)
        run: go test ./... -race -count=1 -timeout 5m

      - name: Test (no-cgo build check)
        run: CGO_ENABLED=0 go test ./... -count=1 -timeout 5m

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          EXT=""
          [ "$GOOS" = "windows" ] && EXT=".exe"
          go build -trimpath -ldflags '-s -w' \
            -o bin/xsmem-${GOOS}-${GOARCH}${EXT} ./cmd/xsmem

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xsmem-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bin/xsmem-*
          retention-days: 7
