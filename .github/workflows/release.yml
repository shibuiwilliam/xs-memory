name: Release

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  # --- Step 1: Auto-bump patch version on main push (skip if already a tag push) ---
  bump:
    name: Bump version
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/')
    outputs:
      new_tag: ${{ steps.bump.outputs.new_tag }}
      skipped: ${{ steps.bump.outputs.skipped }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for tag detection

      - name: Bump patch version
        id: bump
        run: |
          # Find latest semver tag.
          LATEST=$(git tag -l 'v*' --sort=-v:refname | head -1)
          if [ -z "$LATEST" ]; then
            NEW_TAG="v0.1.0"
          else
            # Parse major.minor.patch and bump patch.
            IFS='.' read -r MAJOR MINOR PATCH <<< "${LATEST#v}"
            PATCH=$((PATCH + 1))
            NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          fi

          # Check if this commit already has a tag.
          EXISTING=$(git tag --points-at HEAD 2>/dev/null || true)
          if echo "$EXISTING" | grep -q "^v"; then
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            echo "Commit already tagged: $EXISTING"
          else
            echo "skipped=false" >> "$GITHUB_OUTPUT"
            echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
            echo "Bumping to $NEW_TAG"
          fi

      - name: Push tag
        if: steps.bump.outputs.skipped == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.bump.outputs.new_tag }}"
          git push origin "${{ steps.bump.outputs.new_tag }}"

  # --- Step 2: Build all platforms ---
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: [bump]
    # Run on tag push OR after successful bump.
    if: |
      always() &&
      (startsWith(github.ref, 'refs/tags/v') ||
       (needs.bump.result == 'success' && needs.bump.outputs.skipped == 'false'))
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ needs.bump.outputs.new_tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          EXT=""
          [ "$GOOS" = "windows" ] && EXT=".exe"
          go build -trimpath \
            -ldflags "-s -w -X main.version=${VERSION}" \
            -o xsmem-${GOOS}-${GOARCH}${EXT} ./cmd/xsmem

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xsmem-${{ matrix.goos }}-${{ matrix.goarch }}
          path: xsmem-*

  # --- Step 3: Create GitHub Release ---
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [bump, build]
    if: |
      always() && needs.build.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ needs.bump.outputs.new_tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: dist/xsmem-*

  # --- Step 4: Push Docker image to GitHub Packages ---
  docker:
    name: Push Docker image to GitHub Packages
    runs-on: ubuntu-latest
    needs: [bump, build]
    if: |
      always() && needs.build.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ needs.bump.outputs.new_tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build linux/amd64 binary
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          go build -trimpath \
            -ldflags "-s -w -X main.version=${VERSION}" \
            -o xsmem ./cmd/xsmem

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.version.outputs.tag }}
            type=raw,value=latest
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
